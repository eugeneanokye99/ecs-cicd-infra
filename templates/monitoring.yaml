AWSTemplateFormatVersion: '2010-09-09'
Description: Monitoring stack - CloudWatch alarms and dashboard for ECS service health

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  Environment:
    Type: String
    Default: prod
  ECSClusterName:
    Type: String
  ECSServiceName:
    Type: String
  ALBFullName:
    Type: String
  TargetGroupFullName:
    Type: String

Resources:
  # ── CPU Utilization Alarm ─────────────────────────────────────────────────────
  CPUHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-cpu-high
      AlarmDescription: ECS service CPU utilization exceeded 80% — auto scaling should have kicked in
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Ref ECSServiceName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  CPULowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-cpu-low
      AlarmDescription: ECS service CPU utilization below 10% for extended period
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Ref ECSServiceName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 6
      Threshold: 10
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── Memory Utilization Alarm ──────────────────────────────────────────────────
  MemoryHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-memory-high
      AlarmDescription: ECS service memory utilization exceeded 80%
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Ref ECSServiceName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── ALB 5xx Error Alarm ───────────────────────────────────────────────────────
  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-alb-5xx
      AlarmDescription: ALB is returning 5xx errors — application may be unhealthy
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBFullName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── Target Group Unhealthy Host Alarm ─────────────────────────────────────────
  UnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${ProjectName}-unhealthy-hosts
      AlarmDescription: One or more ECS tasks are failing ALB health checks
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !Ref ALBFullName
        - Name: TargetGroup
          Value: !Ref TargetGroupFullName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── CloudWatch Dashboard ──────────────────────────────────────────────────────
  ServiceDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${ProjectName}-dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "ECS CPU Utilization",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ECS", "CPUUtilization", "ClusterName", "${ECSClusterName}", "ServiceName", "${ECSServiceName}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "ECS Memory Utilization",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ECS", "MemoryUtilization", "ClusterName", "${ECSClusterName}", "ServiceName", "${ECSServiceName}"]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "ALB Request Count",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${ALBFullName}"]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "ALB HTTP 5xx Errors",
                "region": "${AWS::Region}",
                "metrics": [
                  ["AWS/ApplicationELB", "HTTPCode_ELB_5XX_Count", "LoadBalancer", "${ALBFullName}"]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Value: !Ref ServiceDashboard
    Export:
      Name: !Sub ${ProjectName}-DashboardName
