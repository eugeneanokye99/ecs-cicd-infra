AWSTemplateFormatVersion: '2010-09-09'
Description: IAM stack - ECS task execution role, CodeDeploy role, CodePipeline role, and GitHub OIDC role

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  Environment:
    Type: String
    Default: prod
  GithubOrg:
    Type: String
    Description: GitHub organization or username that owns the app repository
  GithubRepo:
    Type: String
    Default: ecs-cicd-app
    Description: GitHub application repository name
  ECRRepositoryArn:
    Type: String
    Description: ARN of the ECR repository
  LogGroupArn:
    Type: String
    Description: ARN of the CloudWatch Log Group
  OIDCProviderArn:
    Type: String
    Description: ARN of the existing GitHub Actions OIDC provider in this account

Resources:
  # ── ECS Task Execution Role ───────────────────────────────────────────────────
  # Allows ECS to pull images from ECR and send logs to CloudWatch
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRAndLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Ref ECRRepositoryArn
              - Sid: ECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub ${LogGroupArn}:*
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── CodeDeploy Role ───────────────────────────────────────────────────────────
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── CodePipeline Role ─────────────────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3ArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource: !Sub arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}/*
              - Sid: S3ArtifactBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}
              - Sid: ECRDescribe
                Effect: Allow
                Action:
                  - ecr:DescribeImages
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: CodeDeployAccess
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetDeploymentGroup
                Resource: '*'
              - Sid: ECSAccess
                Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                  - ecs:UpdateService
                Resource: '*'
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt ECSTaskExecutionRole.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

  # ── EventBridge (CloudWatch Events) Role ──────────────────────────────────────
  # Allows EventBridge to start the CodePipeline on ECR image push
  EventBridgePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipeline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye



  # ── GitHub OIDC Role ──────────────────────────────────────────────────────────
  GitHubOIDCRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-github-oidc-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Allow any branch/tag/PR from the specified repo
                token.actions.githubusercontent.com:sub: !Sub repo:${GithubOrg}/${GithubRepo}:*
      Policies:
        - PolicyName: GitHubActionsPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeImages
                Resource: !Ref ECRRepositoryArn
              - Sid: S3DeployBundleUpload
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub arn:aws:s3:::${ProjectName}-artifacts-${AWS::AccountId}/deploy/*
              - Sid: CFNStackOutputs
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: '*'
              - Sid: IAMGetRole
                Effect: Allow
                Action:
                  - iam:GetRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-task-execution-role
              - Sid: ECSDescribeForTaskDef
                Effect: Allow
                Action:
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: EugeneAnokye

Outputs:
  TaskExecutionRoleArn:
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub ${ProjectName}-TaskExecutionRoleArn

  TaskExecutionRoleName:
    Value: !Ref ECSTaskExecutionRole
    Export:
      Name: !Sub ${ProjectName}-TaskExecutionRoleName

  CodeDeployRoleArn:
    Value: !GetAtt CodeDeployRole.Arn
    Export:
      Name: !Sub ${ProjectName}-CodeDeployRoleArn

  CodePipelineRoleArn:
    Value: !GetAtt CodePipelineRole.Arn
    Export:
      Name: !Sub ${ProjectName}-CodePipelineRoleArn

  EventBridgePipelineRoleArn:
    Value: !GetAtt EventBridgePipelineRole.Arn
    Export:
      Name: !Sub ${ProjectName}-EventBridgePipelineRoleArn

  GitHubOIDCRoleArn:
    Value: !GetAtt GitHubOIDCRole.Arn
    Export:
      Name: !Sub ${ProjectName}-GitHubOIDCRoleArn
